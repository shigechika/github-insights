name: Collect Traffic Data

on:
  schedule:
    # Run 3x daily at JST 10:37, 18:37, 02:37 (prime-minute to avoid congested slots)
    - cron: "37 1 * * *"
    - cron: "37 9 * * *"
    - cron: "37 17 * * *"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Collect traffic data
        env:
          GH_TOKEN: ${{ secrets.GH_INSIGHTS_PAT }}
        run: bash scripts/collect.sh

      - name: Generate charts
        run: bash scripts/generate-charts.sh

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/traffic.json README.md
          git diff --cached --quiet || git commit -m "chore: update traffic data $(date -u +%Y-%m-%d)"
          git push
