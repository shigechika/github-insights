name: Lint

on:
  push:
    paths:
      - "scripts/**"
      - ".github/workflows/lint.yml"
  pull_request:
    paths:
      - "scripts/**"
      - ".github/workflows/lint.yml"

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run shellcheck
        run: shellcheck scripts/*.sh
