name: Lint

on:
  push:
    paths:
      - "scripts/**"
      - ".github/workflows/lint.yml"
  pull_request:
    paths:
      - "scripts/**"
      - ".github/workflows/lint.yml"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run shellcheck
        run: shellcheck scripts/*.sh
